version: 2
updates:
  # Backend (root) npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      production:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      dev:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  # Frontend (client) npm dependencies
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      production:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      dev:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
